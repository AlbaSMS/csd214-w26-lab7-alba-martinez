<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Magazine Form</title>
</head>
<body>
<div th:replace="~{fragments/navbar :: header}"></div>

<!-- The header changes dynamically based on whether the magazine has an ID yet -->
<h1 th:text="${magazine.id == null} ? 'Add New Magazine' : 'Edit Magazine'">Add/Edit Magazine</h1>

<!--
  th:action points to our @PostMapping("/save") route.
  th:object binds this entire form to the "magazine" object we put in the Model suitcase.
-->
<form th:action="@{/magazines/save}" th:object="${magazine}" method="post">

    <!-- HIDDEN INPUT: Crucial for Updates!
         If we don't include the ID, Spring will think this is a brand new magazine and create a duplicate! -->
    <input type="hidden" th:field="*{id}" />

    <label>Title:</label><br/>
    <!-- th:field="*{title}" links this input directly to magazine.setTitle() and magazine.getTitle() -->
    <input type="text" th:field="*{title}" required />
    <br/><br/>

    <label>Publisher:</label><br/>
    <input type="text" th:field="*{publisher}" required />
    <br/>

    <label>Current Issue:</label><br/>
    <input type="date" th:field="*{currentIssue}" required />
    <br/><br/>

    <label>Price:</label><br/>
    <input type="number" step="0.01" th:field="*{price}" required />
    <br/><br/>

    <button type="submit">Save Magazine</button>
</form>

<br/>
<a th:href="@{/magazines}">Cancel and go back</a>

</body>
</html>
